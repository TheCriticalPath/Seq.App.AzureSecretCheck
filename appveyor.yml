version: '{build}'
skip_tags: true
image: Visual Studio 2019
install: []
build_script:
  - pwsh: ./Build.ps1
test: false
artifacts:
  - path: artifacts/Seq.App.*.nupkg
deploy:
  - provider: NuGet
    api_key:
      secure: ${{ secrets.NUGET_API_KEY }}
    skip_symbols: true
    on:
      branch: /^(master|dev)$/
  - provider: GitHub
    auth_token:
      secure: DcyKlAUSqqdeF5rpWUSf0t3DLSbXr56jrmitc4l680pZzL5EGiJF+qKTkxIcs7lK
    artifact: /Seq.App.*\.nupkg/
    tag: v$(appveyor_build_version)
    on:
      branch: master
